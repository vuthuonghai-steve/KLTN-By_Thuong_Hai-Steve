# Pipeline Configuration for Module M1 - Authentication & Profile
# Life-2 Phase: Design & Specification

name: "m1-auth-profile"
version: "1.0"
description: "Module M1 - Authentication & Profile: Login, Register, Profile Management"

# Define stages in execution order
stages:
  - id: stage_01
    skill: flow-design-analyst
    depends_on: []
    input: .skill-context/pipelines/m1/tasks/stage_01_input.json
    output_path: Docs/life-2/diagrams/flow/
    description: "Design business process flow for Auth & Profile"

  - id: stage_02
    skill: sequence-design-analyst
    depends_on: [stage_01]
    input: .skill-context/pipelines/m1/tasks/stage_02_input.json
    output_path: Docs/life-2/diagrams/sequence/
    description: "Design sequence diagrams for Login/Register flows"

  - id: stage_03
    skill: class-diagram-analyst
    depends_on: [stage_02]
    input: .skill-context/pipelines/m1/tasks/stage_03_input.json
    output_path: Docs/life-2/diagrams/class/
    description: "Analyze Users collection structure"

  - id: stage_04
    skill: activity-diagram-design-analyst
    depends_on: [stage_02]
    input: .skill-context/pipelines/m1/tasks/stage_04_input.json
    output_path: Docs/life-2/diagrams/activity/
    description: "Design activity diagram for auth process"

  - id: stage_05
    skill: schema-design-analyst
    depends_on: [stage_03, stage_04]
    input: .skill-context/pipelines/m1/tasks/stage_05_input.json
    output_path: Docs/life-2/database/
    description: "Design Users collection schema"

  - id: stage_06
    skill: ui-architecture-analyst
    depends_on: [stage_03]
    input: .skill-context/pipelines/m1/tasks/stage_06_input.json
    output_path: Docs/life-2/ui/
    description: "Extract UI specs for Login, Register, Profile screens"

# Execution settings
execution:
  mode: sequential  # sequential | parallel
  max_retries: 2
  continue_on_error: false
  timeout_per_stage: 1800  # 30 minutes in seconds

# Checkpoints - pipeline will pause at these stages for human review
checkpoints:
  - stage_02  # Pause after flow design
  - stage_05  # Pause after schema design
